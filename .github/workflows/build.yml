name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: |
          npm install @capacitor/core@5.7.0 @capacitor/cli @capacitor/android
          echo '{"appId":"com.mandy.projects","appName":"MandysProjects","webDir":"www"}' > capacitor.config.json
          mkdir www
          cp *.html www/
          npx cap add android
          npx cap sync android
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Fix Gradle version
        run: sed -i 's/gradle-8.2.1-all/gradle-8.5-all/g' android/gradle/wrapper/gradle-wrapper.properties
      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
