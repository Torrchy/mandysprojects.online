<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Loops — mp</title>
  <meta name="theme-color" content="#08090d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── Ring visualization ── */
    .rings-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem 0 1rem;
    }
    .rings-svg {
      width: 220px;
      height: 220px;
    }
    .ring {
      fill: none;
      stroke-width: 7;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease, opacity 0.6s ease, filter 0.6s ease;
    }
    .ring--incomplete {
      opacity: 0.18;
      stroke-dasharray: 6 8;
    }
    .ring--complete {
      opacity: 1;
      stroke-dasharray: none;
    }
    .placeholder-ring {
      fill: none;
      stroke: var(--text4);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 8 10;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .placeholder-text {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      fill: var(--text4);
      text-anchor: middle;
    }

    /* ── Completion counter ── */
    .completion {
      text-align: center;
      padding: 0.25rem 0 1.5rem;
    }
    .completion-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
    }
    .completion-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text4);
      margin-top: 0.15rem;
    }

    /* ── Week row ── */
    .week-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0.5rem 0 0.25rem;
    }
    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .week-day-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text4);
      text-transform: uppercase;
    }
    .week-day-label.today {
      color: var(--accent);
    }
    .week-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      transition: opacity 0.3s;
    }

    /* ── Habit list ── */
    .habit-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 1rem;
    }
    .habit-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      transition: border-color 0.3s;
    }
    .habit-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
    }
    .habit-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .habit-name {
      flex: 1;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
    }
    .habit-history {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-right: 0.3rem;
    }
    .history-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      border: 1.5px solid var(--text4);
      background: transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .history-dot.filled {
      border-color: transparent;
    }
    .habit-toggle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s var(--ease);
      flex-shrink: 0;
      color: transparent;
    }
    .habit-toggle:hover {
      border-color: var(--text3);
    }
    .habit-toggle.done {
      border-color: transparent;
      color: #fff;
    }
    .habit-toggle svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .habit-delete {
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      color: var(--text4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .habit-card:hover .habit-delete {
      opacity: 1;
    }
    .habit-delete:hover {
      color: var(--red);
      background: rgba(248, 113, 113, 0.1);
    }
    .habit-delete svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.56rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text4);
      padding: 0.75rem 0 0.5rem;
    }

    /* ── Bottom sheet: color picker ── */
    .color-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0.75rem 0 1rem;
    }
    .color-opt {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .color-opt:hover {
      transform: scale(1.1);
    }
    .color-opt.selected {
      border-color: #fff;
      transform: scale(1.15);
    }

    .sheet-field {
      margin-bottom: 0.75rem;
    }
    .sheet-field-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.4rem;
    }

    /* ── Touch: show delete on mobile ── */
    @media (hover: none) {
      .habit-delete { opacity: 0.5; }
    }
  </style>
</head>

<body>
  <div class="page">
    <!-- Header -->
    <header class="page-head">
      <span class="page-title">Loops</span>
      <div class="page-actions">
        <button class="page-action" id="addBtn" aria-label="Add loop">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Week row -->
    <div class="week-row" id="weekRow"></div>

    <!-- Ring visualization -->
    <div class="rings-wrap">
      <svg class="rings-svg" id="ringsSvg" viewBox="0 0 220 220">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
      </svg>
    </div>

    <!-- Completion -->
    <div class="completion" id="completion">
      <div class="completion-num">0/0</div>
      <div class="completion-label">completed today</div>
    </div>

    <!-- Habit list -->
    <div class="section-label">Your Loops</div>
    <div class="habit-list" id="habitList"></div>
  </div>

  <!-- Add habit bottom sheet -->
  <div class="sheet-overlay" id="addSheet">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-body">
        <div class="sheet-title">New Loop</div>
        <div class="sheet-field">
          <div class="sheet-field-label">Name</div>
          <input type="text" class="glass-input" id="loopNameInput" placeholder="e.g. Run, Meditate, Read..." maxlength="30" />
        </div>
        <div class="sheet-field">
          <div class="sheet-field-label">Color</div>
          <div class="color-options" id="colorOptions"></div>
        </div>
        <button class="btn btn-accent" id="saveLoopBtn" style="width:100%; padding: 0.75rem;">Save Loop</button>
      </div>
    </div>
  </div>

  <!-- Dock nav -->
  <nav class="dock">
    <a class="dock-item" href="index.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2m-10-10h2m16 0h2m-3.3-6.7-1.4 1.4M6.7 17.3l-1.4 1.4m0-14.1 1.4 1.4m10.6 10.6 1.4 1.4"/></svg>
      <span>Now</span>
    </a>
    <a class="dock-item" href="stream.html">
      <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
      <span>Stream</span>
    </a>
    <a class="dock-item active" href="loops.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg>
      <span>Loops</span>
    </a>
    <a class="dock-item" href="spectrum.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><circle cx="15" cy="15" r="2"/><circle cx="15" cy="9" r="1"/><circle cx="9" cy="15" r="1"/></svg>
      <span>Spectrum</span>
    </a>
  </nav>

  <script>
    /* ── Time accent ── */
    function setTimeAccent() {
      var h = new Date().getHours();
      var hue;
      if (h >= 6 && h < 12)       hue = 35;
      else if (h >= 12 && h < 17)  hue = 175;
      else if (h >= 17 && h < 21)  hue = 270;
      else                         hue = 220;
      document.documentElement.style.setProperty('--accent-h', hue);
    }
    setTimeAccent();

    /* ── Helpers ── */
    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function todayStr() {
      var d = new Date();
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function dateStr(date) {
      return date.getFullYear() + '-' +
        String(date.getMonth() + 1).padStart(2, '0') + '-' +
        String(date.getDate()).padStart(2, '0');
    }

    /* ── Data ── */
    var COLORS = ['#a78bfa', '#f472b6', '#34d399', '#60a5fa', '#fbbf24', '#fb923c', '#f87171', '#2dd4bf'];

    function getLoops() {
      try { return JSON.parse(localStorage.getItem('mp_loops')) || []; }
      catch (e) { return []; }
    }
    function saveLoops(arr) {
      localStorage.setItem('mp_loops', JSON.stringify(arr));
    }
    function getLog() {
      try { return JSON.parse(localStorage.getItem('mp_loops_log')) || {}; }
      catch (e) { return {}; }
    }
    function saveLog(obj) {
      localStorage.setItem('mp_loops_log', JSON.stringify(obj));
    }

    function isTodayDone(loopId) {
      var log = getLog();
      var today = todayStr();
      return (log[today] || []).indexOf(loopId) !== -1;
    }

    function toggleToday(loopId) {
      var log = getLog();
      var today = todayStr();
      if (!log[today]) log[today] = [];
      var idx = log[today].indexOf(loopId);
      if (idx === -1) {
        log[today].push(loopId);
      } else {
        log[today].splice(idx, 1);
      }
      saveLog(log);
    }

    function isDone(loopId, dateString) {
      var log = getLog();
      return (log[dateString] || []).indexOf(loopId) !== -1;
    }

    /* ── Ring radii ── */
    function getRingRadii(count) {
      if (count === 0) return [];
      var minR = 30;
      var maxR = 95;
      if (count === 1) return [60];
      var step = Math.min(18, (maxR - minR) / (count - 1));
      var radii = [];
      var startR = 110 / 2 - ((count - 1) * step) / 2;
      if (startR < minR) startR = minR;
      for (var i = 0; i < count; i++) {
        radii.push(startR + i * step);
      }
      return radii;
    }

    /* ── Render rings SVG ── */
    function renderRings() {
      var svg = document.getElementById('ringsSvg');
      var loops = getLoops();
      var cx = 110, cy = 110;

      // Clear everything except defs
      var defs = svg.querySelector('defs');
      svg.innerHTML = '';
      svg.appendChild(defs);

      if (loops.length === 0) {
        // Placeholder
        var placeholderCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        placeholderCircle.setAttribute('cx', cx);
        placeholderCircle.setAttribute('cy', cy);
        placeholderCircle.setAttribute('r', 60);
        placeholderCircle.classList.add('placeholder-ring');
        svg.appendChild(placeholderCircle);

        var text1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text1.setAttribute('x', cx);
        text1.setAttribute('y', cy - 4);
        text1.classList.add('placeholder-text');
        text1.textContent = 'add your';
        svg.appendChild(text1);

        var text2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text2.setAttribute('x', cx);
        text2.setAttribute('y', cy + 12);
        text2.classList.add('placeholder-text');
        text2.textContent = 'first loop';
        svg.appendChild(text2);
        return;
      }

      var radii = getRingRadii(loops.length);

      loops.forEach(function (loop, i) {
        var r = radii[i];
        var circumference = 2 * Math.PI * r;
        var done = isTodayDone(loop.id);

        // Background track
        var bg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        bg.setAttribute('cx', cx);
        bg.setAttribute('cy', cy);
        bg.setAttribute('r', r);
        bg.setAttribute('fill', 'none');
        bg.setAttribute('stroke', loop.color);
        bg.setAttribute('stroke-width', '7');
        bg.setAttribute('stroke-linecap', 'round');
        bg.setAttribute('opacity', '0.07');
        svg.appendChild(bg);

        // Main ring
        var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', cx);
        circle.setAttribute('cy', cy);
        circle.setAttribute('r', r);
        circle.setAttribute('stroke', loop.color);
        circle.setAttribute('transform', 'rotate(-90 ' + cx + ' ' + cy + ')');
        circle.classList.add('ring');

        if (done) {
          circle.classList.add('ring--complete');
          circle.setAttribute('stroke-dasharray', circumference);
          circle.setAttribute('stroke-dashoffset', '0');
          circle.setAttribute('filter', 'url(#glow)');
          circle.style.filter = 'drop-shadow(0 0 6px ' + loop.color + ')';
        } else {
          circle.classList.add('ring--incomplete');
          circle.setAttribute('stroke-dasharray', '6 8');
          circle.setAttribute('stroke-dashoffset', '0');
        }

        svg.appendChild(circle);
      });
    }

    /* ── Render completion ── */
    function renderCompletion() {
      var loops = getLoops();
      var done = 0;
      loops.forEach(function (l) {
        if (isTodayDone(l.id)) done++;
      });
      var el = document.getElementById('completion');
      el.querySelector('.completion-num').textContent = done + '/' + loops.length;
    }

    /* ── Render week row ── */
    function renderWeek() {
      var container = document.getElementById('weekRow');
      container.innerHTML = '';
      var loops = getLoops();
      var total = loops.length;
      var labels = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
      var now = new Date();
      var todayDow = now.getDay(); // 0=Sun
      // Build 7 days ending today
      for (var i = 6; i >= 0; i--) {
        var d = new Date(now);
        d.setDate(d.getDate() - i);
        var ds = dateStr(d);
        var dow = d.getDay();
        var dayLabel = labels[dow === 0 ? 6 : dow - 1];
        var isToday = i === 0;

        var doneCount = 0;
        if (total > 0) {
          loops.forEach(function (l) {
            if (isDone(l.id, ds)) doneCount++;
          });
        }
        var ratio = total > 0 ? doneCount / total : 0;

        var wrap = document.createElement('div');
        wrap.className = 'week-day';

        var lbl = document.createElement('div');
        lbl.className = 'week-day-label' + (isToday ? ' today' : '');
        lbl.textContent = dayLabel;

        var dot = document.createElement('div');
        dot.className = 'week-dot';
        dot.style.opacity = total === 0 ? 0.08 : (ratio > 0 ? Math.max(0.15, ratio) : 0.08);

        wrap.appendChild(lbl);
        wrap.appendChild(dot);
        container.appendChild(wrap);
      }
    }

    /* ── Render habit list ── */
    function renderHabitList() {
      var container = document.getElementById('habitList');
      container.innerHTML = '';
      var loops = getLoops();

      if (loops.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty';
        empty.innerHTML = '<div class="empty-text">Tap + to add your first loop</div>';
        container.appendChild(empty);
        return;
      }

      // Last 7 days (oldest first)
      var days = [];
      var now = new Date();
      for (var i = 6; i >= 0; i--) {
        var d = new Date(now);
        d.setDate(d.getDate() - i);
        days.push(dateStr(d));
      }

      loops.forEach(function (loop) {
        var card = document.createElement('div');
        card.className = 'habit-card';

        // Color dot
        var dot = document.createElement('div');
        dot.className = 'habit-dot';
        dot.style.background = loop.color;

        // Name
        var name = document.createElement('div');
        name.className = 'habit-name';
        name.textContent = loop.name;

        // History dots
        var history = document.createElement('div');
        history.className = 'habit-history';
        days.forEach(function (ds) {
          var hd = document.createElement('div');
          hd.className = 'history-dot';
          if (isDone(loop.id, ds)) {
            hd.classList.add('filled');
            hd.style.background = loop.color;
          }
          history.appendChild(hd);
        });

        // Toggle
        var done = isTodayDone(loop.id);
        var toggle = document.createElement('button');
        toggle.className = 'habit-toggle' + (done ? ' done' : '');
        toggle.style.borderColor = done ? 'transparent' : loop.color + '44';
        toggle.style.background = done ? loop.color : 'none';
        toggle.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
        toggle.addEventListener('click', function () {
          toggleToday(loop.id);
          renderAll();
        });

        // Delete
        var del = document.createElement('button');
        del.className = 'habit-delete';
        del.innerHTML = '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        del.addEventListener('click', function () {
          if (confirm('Delete "' + loop.name + '"?')) {
            var arr = getLoops().filter(function (l) { return l.id !== loop.id; });
            saveLoops(arr);
            renderAll();
          }
        });

        card.appendChild(dot);
        card.appendChild(name);
        card.appendChild(history);
        card.appendChild(toggle);
        card.appendChild(del);
        container.appendChild(card);
      });
    }

    function renderAll() {
      renderRings();
      renderCompletion();
      renderWeek();
      renderHabitList();
    }

    /* ── Bottom sheet ── */
    var sheet = document.getElementById('addSheet');
    var selectedColor = COLORS[0];

    function openSheet() {
      sheet.classList.add('open');
      document.getElementById('loopNameInput').value = '';
      selectedColor = COLORS[0];
      renderColorPicker();
      setTimeout(function () {
        document.getElementById('loopNameInput').focus();
      }, 350);
    }
    function closeSheet() {
      sheet.classList.remove('open');
    }

    document.getElementById('addBtn').addEventListener('click', openSheet);
    sheet.addEventListener('click', function (e) {
      if (e.target === sheet) closeSheet();
    });

    function renderColorPicker() {
      var container = document.getElementById('colorOptions');
      container.innerHTML = '';
      COLORS.forEach(function (c) {
        var opt = document.createElement('div');
        opt.className = 'color-opt' + (c === selectedColor ? ' selected' : '');
        opt.style.background = c;
        opt.addEventListener('click', function () {
          selectedColor = c;
          renderColorPicker();
        });
        container.appendChild(opt);
      });
    }

    document.getElementById('saveLoopBtn').addEventListener('click', function () {
      var name = document.getElementById('loopNameInput').value.trim();
      if (!name) return;
      var loops = getLoops();
      if (loops.length >= 7) {
        alert('Maximum 7 loops allowed');
        return;
      }
      loops.push({
        id: genId(),
        name: name,
        color: selectedColor,
        created: todayStr()
      });
      saveLoops(loops);
      closeSheet();
      renderAll();
    });

    // Save on Enter
    document.getElementById('loopNameInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        document.getElementById('saveLoopBtn').click();
      }
    });

    /* ── Init ── */
    renderColorPicker();
    renderAll();
  </script>
</body>
</html>
