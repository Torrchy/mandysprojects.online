<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>mp &middot; Stream</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#08090d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Filter chips ── */
    .chips {
      display: flex;
      gap: 6px;
      padding: 0.5rem 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }

    /* ── Search ── */
    .search-wrap {
      margin-bottom: 0.5rem;
    }
    .search-input {
      width: 100%;
      padding: 0.65rem 0.9rem 0.65rem 2.2rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-input:focus {
      border-color: var(--accent-mid);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-input::placeholder { color: var(--text4); }
    .search-wrap {
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text4);
      pointer-events: none;
    }

    /* ── Feed ── */
    .feed { display: flex; flex-direction: column; gap: 6px; padding-bottom: 1rem; }
    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 0.8rem 0.9rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      transition: all 0.2s var(--ease);
      position: relative;
    }
    .feed-item:hover {
      border-color: rgba(255,255,255,0.1);
      transform: translateX(2px);
    }
    .feed-item.pinned {
      border-color: var(--accent-mid);
      background: color-mix(in srgb, var(--accent) 4%, var(--bg2));
    }
    .feed-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
      opacity: 0.8;
    }
    .feed-body { flex: 1; min-width: 0; }
    .feed-text {
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
    }
    .feed-text a {
      color: var(--accent);
      text-decoration: none;
    }
    .feed-text a:hover { text-decoration: underline; }
    .feed-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--text4);
      margin-top: 0.3rem;
    }
    .feed-actions {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .feed-btn {
      background: none; border: none;
      color: var(--text4);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
    }
    .feed-item:hover .feed-btn { opacity: 1; }
    .feed-btn.pin-btn.active {
      opacity: 1;
      color: var(--amber);
    }
    .feed-btn.delete-btn:hover { color: var(--red); }
    .feed-btn.pin-btn:hover { color: var(--amber); }

    .feed-item.task .feed-text { cursor: pointer; }
    .feed-item.task.done .feed-text {
      text-decoration: line-through;
      opacity: 0.4;
    }

    /* Flash animation for new items */
    @keyframes itemIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .feed-item.new { animation: itemIn 0.35s var(--ease); }

    /* ── Bottom sheet (add form) ── */
    .type-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem;
    }
    .type-btn {
      flex: 1;
      padding: 0.55rem 0.5rem;
      border-radius: var(--r-sm);
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text3);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .type-btn.active {
      border-color: var(--accent-mid);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, var(--bg2));
    }
    .sheet-body .glass-input {
      width: 100%;
      margin-bottom: 0.75rem;
    }
    .sheet-body .btn-accent {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <div class="page-head">
      <span class="page-title">STREAM</span>
      <button class="page-action" id="addBtn" title="Add item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <!-- Search -->
    <div class="search-wrap fade-up">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search stream..." autocomplete="off" />
    </div>

    <!-- Filter chips -->
    <div class="chips fade-up" style="animation-delay:0.05s">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="thought">Thoughts</button>
      <button class="chip" data-filter="task">Tasks</button>
      <button class="chip" data-filter="link">Links</button>
    </div>

    <!-- Feed -->
    <div class="feed stagger" id="feed"></div>
  </div>

  <!-- Bottom sheet overlay + sheet -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-body">
      <div class="label" style="margin-bottom:0.75rem;">Capture</div>
      <div class="type-selector">
        <button class="type-btn active" data-type="thought">Thought</button>
        <button class="type-btn" data-type="task">Task</button>
        <button class="type-btn" data-type="link">Link</button>
      </div>
      <input class="glass-input" id="sheetInput" type="text" placeholder="What's on your mind?" autocomplete="off" />
      <button class="btn-accent" id="sheetSave">Save</button>
    </div>
  </div>

  <!-- Dock -->
  <nav class="dock">
    <a class="dock-item" href="index.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2m-10-10h2m16 0h2m-3.3-6.7-1.4 1.4M6.7 17.3l-1.4 1.4m0-14.1 1.4 1.4m10.6 10.6 1.4 1.4"/></svg>
      <span>Now</span>
    </a>
    <a class="dock-item active" href="stream.html">
      <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
      <span>Stream</span>
    </a>
    <a class="dock-item" href="loops.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg>
      <span>Loops</span>
    </a>
    <a class="dock-item" href="spectrum.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><circle cx="15" cy="15" r="2"/><circle cx="15" cy="9" r="1"/><circle cx="9" cy="15" r="1"/></svg>
      <span>Spectrum</span>
    </a>
  </nav>

  <script>
    // ── Time accent
    function setTimeAccent() {
      var h = new Date().getHours();
      var hue;
      if (h >= 6 && h < 12)       hue = 35;
      else if (h >= 12 && h < 17)  hue = 175;
      else if (h >= 17 && h < 21)  hue = 270;
      else                         hue = 220;
      document.documentElement.style.setProperty('--accent-h', hue);
    }
    setTimeAccent();

    // ── Stream data
    var STREAM_KEY = 'mp_stream';
    var activeFilter = 'all';
    var searchQuery = '';

    function getStream() {
      try { return JSON.parse(localStorage.getItem(STREAM_KEY) || '[]'); }
      catch(e) { return []; }
    }
    function saveStream(items) {
      localStorage.setItem(STREAM_KEY, JSON.stringify(items));
    }
    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    // ── Type colors
    function typeColor(type) {
      switch(type) {
        case 'link':    return 'var(--blue)';
        case 'task':    return 'var(--amber)';
        case 'thought': return 'var(--accent)';
        default:        return 'var(--text3)';
      }
    }

    // ── Helpers
    function escHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function truncate(s, n) {
      return s.length > n ? s.slice(0, n) + '...' : s;
    }
    function timeAgo(iso) {
      var diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      var days = Math.floor(diff / 86400);
      if (days === 1) return 'yesterday';
      if (days < 7) return days + 'd ago';
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }

    // ── Render feed
    function renderFeed() {
      var items = getStream();

      // Sort: pinned first, then reverse chronological
      items.sort(function(a, b) {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return new Date(b.ts) - new Date(a.ts);
      });

      // Filter by type
      if (activeFilter !== 'all') {
        items = items.filter(function(i) { return i.type === activeFilter; });
      }

      // Filter by search
      if (searchQuery) {
        var q = searchQuery.toLowerCase();
        items = items.filter(function(i) {
          return i.content.toLowerCase().indexOf(q) !== -1;
        });
      }

      var el = document.getElementById('feed');

      if (!items.length) {
        var msg = searchQuery || activeFilter !== 'all'
          ? 'No matching items.'
          : 'Your stream is empty. Capture something from the Now page.';
        el.innerHTML = '<div class="empty"><div class="empty-icon">~</div><div class="empty-text">' + msg + '</div></div>';
        return;
      }

      el.innerHTML = items.map(function(item) {
        var content = item.content;
        if (item.type === 'link') {
          content = '<a href="' + escHtml(item.content) + '" target="_blank" rel="noopener">' + escHtml(truncate(item.content, 80)) + '</a>';
        } else {
          content = escHtml(content);
        }
        var doneClass = (item.type === 'task' && item.done) ? ' done' : '';
        var pinnedClass = item.pinned ? ' pinned' : '';
        var pinActive = item.pinned ? ' active' : '';
        return '<div class="feed-item ' + item.type + doneClass + pinnedClass + '" data-id="' + item.id + '">'
          + '<div class="feed-dot" style="background:' + typeColor(item.type) + '"></div>'
          + '<div class="feed-body">'
          +   '<div class="feed-text">' + content + '</div>'
          +   '<div class="feed-meta">' + timeAgo(item.ts) + ' &middot; ' + item.type + (item.pinned ? ' &middot; pinned' : '') + '</div>'
          + '</div>'
          + '<div class="feed-actions">'
          +   '<button class="feed-btn pin-btn' + pinActive + '" title="Pin">'
          +     '<svg width="14" height="14" viewBox="0 0 24 24" fill="' + (item.pinned ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
          +   '</button>'
          +   '<button class="feed-btn delete-btn" title="Delete">&times;</button>'
          + '</div>'
          + '</div>';
      }).join('');

      bindFeedEvents();
    }

    function bindFeedEvents() {
      var el = document.getElementById('feed');

      // Delete
      el.querySelectorAll('.delete-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var id = btn.closest('.feed-item').dataset.id;
          var stream = getStream().filter(function(i) { return i.id !== id; });
          saveStream(stream);
          renderFeed();
        });
      });

      // Pin toggle
      el.querySelectorAll('.pin-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var id = btn.closest('.feed-item').dataset.id;
          var stream = getStream();
          var item = stream.find(function(i) { return i.id === id; });
          if (item) {
            item.pinned = !item.pinned;
            saveStream(stream);
            renderFeed();
          }
        });
      });

      // Task toggle
      el.querySelectorAll('.feed-item.task .feed-text').forEach(function(txt) {
        txt.addEventListener('click', function() {
          var id = txt.closest('.feed-item').dataset.id;
          var stream = getStream();
          var item = stream.find(function(i) { return i.id === id; });
          if (item) {
            item.done = !item.done;
            saveStream(stream);
            renderFeed();
          }
        });
      });
    }

    // ── Filter chips
    document.querySelectorAll('.chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        renderFeed();
      });
    });

    // ── Search
    var searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function() {
      searchQuery = searchInput.value.trim();
      renderFeed();
    });

    // ── Bottom sheet
    var sheet = document.getElementById('sheet');
    var overlay = document.getElementById('sheetOverlay');
    var addBtn = document.getElementById('addBtn');
    var sheetInput = document.getElementById('sheetInput');
    var sheetSave = document.getElementById('sheetSave');
    var selectedType = 'thought';

    function openSheet() {
      sheet.classList.add('open');
      overlay.classList.add('open');
      setTimeout(function() { sheetInput.focus(); }, 300);
    }
    function closeSheet() {
      sheet.classList.remove('open');
      overlay.classList.remove('open');
      sheetInput.value = '';
    }

    addBtn.addEventListener('click', openSheet);
    overlay.addEventListener('click', closeSheet);

    // Type selector
    document.querySelectorAll('.type-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        selectedType = btn.dataset.type;
        var placeholders = {
          thought: "What's on your mind?",
          task: 'What needs doing?',
          link: 'Paste a URL...'
        };
        sheetInput.placeholder = placeholders[selectedType] || '';
      });
    });

    // Save from sheet
    function saveFromSheet() {
      var content = sheetInput.value.trim();
      if (!content) return;

      var item = {
        id: genId(),
        type: selectedType,
        content: content,
        done: false,
        ts: new Date().toISOString()
      };

      var stream = getStream();
      stream.unshift(item);
      saveStream(stream);
      closeSheet();
      renderFeed();
    }

    sheetSave.addEventListener('click', saveFromSheet);
    sheetInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveFromSheet();
    });

    // ── Sheet swipe-to-dismiss
    (function() {
      var startY = 0, currentY = 0, dragging = false;
      var handle = sheet.querySelector('.sheet-handle');

      handle.addEventListener('touchstart', function(e) {
        startY = e.touches[0].clientY;
        dragging = true;
        sheet.style.transition = 'none';
      });

      document.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        currentY = e.touches[0].clientY;
        var dy = Math.max(0, currentY - startY);
        sheet.style.transform = 'translateY(' + dy + 'px)';
      });

      document.addEventListener('touchend', function() {
        if (!dragging) return;
        dragging = false;
        sheet.style.transition = '';
        sheet.style.transform = '';
        if (currentY - startY > 80) {
          closeSheet();
        }
        startY = 0;
        currentY = 0;
      });
    })();

    // ── Init
    renderFeed();
  </script>
</body>
</html>
