<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Spectrum — mp</title>

  <!-- PWA -->
  <meta name="theme-color" content="#08090d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <!-- Shared styles -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── Color Field ── */
    .field-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 0.5rem;
    }

    .field-label-top,
    .field-label-bottom {
      font-size: 0.56rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text4);
      padding: 4px 0;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .field-label-left,
    .field-label-right {
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text4);
      writing-mode: vertical-lr;
      text-orientation: mixed;
      white-space: nowrap;
    }

    .field-label-left {
      transform: rotate(180deg);
    }

    .color-field {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      cursor: crosshair;
      overflow: hidden;
      touch-action: none;
      /* 4-corner gradient via overlapping linear gradients */
      background:
        linear-gradient(to right, #3b82f6, #f87171),
        linear-gradient(to right, #a78bfa, #fbbf24);
      background-size: 100% 100%;
      background-position: bottom, top;
    }

    /* Use a pseudo-element to blend top and bottom rows */
    .color-field::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(0,0,0,0) 0%
      );
      pointer-events: none;
    }

    /* Actually, use a canvas-like approach with 4-stop mesh via layered gradients */
    .color-field {
      background:
        linear-gradient(to bottom, #a78bfa, #3b82f6);
    }
    .color-field::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #fbbf24, #f87171);
      mask: linear-gradient(to right, transparent, black);
      -webkit-mask: linear-gradient(to right, transparent, black);
      pointer-events: none;
    }

    .field-marker {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: transparent;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 6px rgba(0,0,0,0.4);
      z-index: 3;
      display: none;
    }

    .field-marker.visible {
      display: block;
    }

    .field-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0.5;
      z-index: 2;
    }

    /* ── Note Input ── */
    .note-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 1rem;
      width: 100%;
      max-width: 320px;
    }

    .note-row.visible {
      display: flex;
    }

    .note-row .glass-input {
      flex: 1;
      padding: 0.6rem 0.85rem;
      font-size: 0.82rem;
    }

    .note-color-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    /* ── Week Ribbon ── */
    .ribbon-section {
      margin-top: 2rem;
    }

    .ribbon-section .label {
      margin-bottom: 0.65rem;
    }

    .ribbon {
      display: flex;
      gap: 6px;
    }

    .ribbon-day {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .ribbon-bar {
      width: 100%;
      height: 32px;
      border-radius: var(--r-xs);
      background: var(--bg3);
      border: 1px solid var(--border);
      transition: background 0.3s;
    }

    .ribbon-label {
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text4);
    }

    /* ── History ── */
    .history-section {
      margin-top: 2rem;
      margin-bottom: 1rem;
    }

    .history-section .label {
      margin-bottom: 0.65rem;
    }

    .history-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      margin-bottom: 6px;
      animation: fadeUp 0.4s var(--ease) both;
      position: relative;
    }

    .history-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-body {
      flex: 1;
      min-width: 0;
    }

    .history-note {
      font-size: 0.82rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-note.muted {
      color: var(--text4);
      font-style: italic;
    }

    .history-time {
      font-size: 0.6rem;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .history-del {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text4);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 4px 6px;
      border-radius: var(--r-xs);
      transition: all 0.2s;
    }

    .history-card:hover .history-del {
      opacity: 1;
    }

    .history-del:hover {
      color: var(--red);
      background: rgba(248, 113, 113, 0.1);
    }

    /* Mobile: always show delete */
    @media (hover: none) {
      .history-del { opacity: 0.5; }
    }

    @media (max-width: 380px) {
      .color-field {
        width: 260px;
        height: 260px;
      }
    }
  </style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <header class="page-head">
    <div class="page-title">Spectrum</div>
  </header>

  <!-- Color Field -->
  <div class="field-wrap fade-up">
    <div class="field-label-top">pleasant</div>
    <div class="field-row">
      <div class="field-label-left">low energy</div>
      <div class="color-field" id="colorField">
        <div class="field-marker" id="marker"></div>
      </div>
      <div class="field-label-right">high energy</div>
    </div>
    <div class="field-label-bottom">unpleasant</div>

    <!-- Note input -->
    <div class="note-row" id="noteRow">
      <div class="note-color-dot" id="noteColorDot"></div>
      <input type="text" class="glass-input" id="noteInput" placeholder="Add a note (optional)" maxlength="120" />
      <button class="btn btn-accent btn-sm" id="logBtn">Log</button>
    </div>
  </div>

  <!-- Week Ribbon -->
  <section class="ribbon-section fade-up" style="animation-delay:.06s">
    <div class="label">Your week in color</div>
    <div class="ribbon" id="ribbon"></div>
  </section>

  <!-- History -->
  <section class="history-section fade-up" style="animation-delay:.12s">
    <div class="label">Recent</div>
    <div id="historyList"></div>
  </section>
</div>

<!-- Dock Nav -->
<nav class="dock">
  <a class="dock-item" href="index.html">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2m-10-10h2m16 0h2m-3.3-6.7-1.4 1.4M6.7 17.3l-1.4 1.4m0-14.1 1.4 1.4m10.6 10.6 1.4 1.4"/></svg>
    <span>Now</span>
  </a>
  <a class="dock-item" href="stream.html">
    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
    <span>Stream</span>
  </a>
  <a class="dock-item" href="loops.html">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg>
    <span>Loops</span>
  </a>
  <a class="dock-item active" href="spectrum.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><circle cx="15" cy="15" r="2"/><circle cx="15" cy="9" r="1"/><circle cx="9" cy="15" r="1"/></svg>
    <span>Spectrum</span>
  </a>
</nav>

<script>
/* ── Time-of-day accent ── */
function setTimeAccent() {
  var h = new Date().getHours();
  var hue;
  if (h >= 6 && h < 12)       hue = 35;
  else if (h >= 12 && h < 17)  hue = 175;
  else if (h >= 17 && h < 21)  hue = 270;
  else                         hue = 220;
  document.documentElement.style.setProperty('--accent-h', hue);
}
setTimeAccent();

/* ── Utilities ── */
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function posToColor(x, y) {
  var tl = [167,139,250], tr = [251,191,36];
  var bl = [59,130,246],  br = [248,113,113];
  var r = Math.round(tl[0]*(1-x)*(1-y) + tr[0]*x*(1-y) + bl[0]*(1-x)*y + br[0]*x*y);
  var g = Math.round(tl[1]*(1-x)*(1-y) + tr[1]*x*(1-y) + bl[1]*(1-x)*y + br[1]*x*y);
  var b = Math.round(tl[2]*(1-x)*(1-y) + tr[2]*x*(1-y) + bl[2]*(1-x)*y + br[2]*x*y);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function parseRGB(str) {
  var m = str.match(/(\d+)/g);
  return m ? [+m[0], +m[1], +m[2]] : [0,0,0];
}

function load() {
  try { return JSON.parse(localStorage.getItem('mp_spectrum')) || []; }
  catch(e) { return []; }
}

function save(data) {
  localStorage.setItem('mp_spectrum', JSON.stringify(data));
}

function dayKey(date) {
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}

function todayKey() {
  return dayKey(new Date());
}

function formatTime(ts) {
  var d = new Date(ts);
  var now = new Date();
  var timeStr = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  if (dayKey(d) === dayKey(now)) return 'Today ' + timeStr;
  if (dayKey(new Date(now - 86400000)) === dayKey(d)) return 'Yesterday ' + timeStr;
  return d.toLocaleDateString([], {day:'numeric', month:'short'}) + ' ' + timeStr;
}

/* ── State ── */
var entries = load();
var pendingX = null, pendingY = null, pendingColor = null;

var field = document.getElementById('colorField');
var marker = document.getElementById('marker');
var noteRow = document.getElementById('noteRow');
var noteInput = document.getElementById('noteInput');
var noteColorDot = document.getElementById('noteColorDot');
var logBtn = document.getElementById('logBtn');

/* ── Color Field interaction ── */
function handleFieldTap(e) {
  var rect = field.getBoundingClientRect();
  var clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  var x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  var y = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));

  pendingX = x;
  pendingY = y;
  pendingColor = posToColor(x, y);

  // Place marker
  marker.style.left = (x * 100) + '%';
  marker.style.top = (y * 100) + '%';
  marker.classList.add('visible');

  // Show note row
  noteColorDot.style.background = pendingColor;
  noteRow.classList.add('visible');
  noteInput.value = '';
  noteInput.focus();
}

field.addEventListener('click', handleFieldTap);
field.addEventListener('touchend', function(e) {
  // Use last touch position
  if (e.changedTouches && e.changedTouches.length) {
    var rect = field.getBoundingClientRect();
    var touch = e.changedTouches[0];
    var x = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
    var y = Math.max(0, Math.min(1, (touch.clientY - rect.top) / rect.height));
    pendingX = x;
    pendingY = y;
    pendingColor = posToColor(x, y);
    marker.style.left = (x * 100) + '%';
    marker.style.top = (y * 100) + '%';
    marker.classList.add('visible');
    noteColorDot.style.background = pendingColor;
    noteRow.classList.add('visible');
    noteInput.value = '';
  }
  e.preventDefault();
});

/* ── Log Entry ── */
logBtn.addEventListener('click', function() {
  if (pendingX === null) return;
  var entry = {
    id: genId(),
    x: Math.round(pendingX * 1000) / 1000,
    y: Math.round(pendingY * 1000) / 1000,
    color: pendingColor,
    note: noteInput.value.trim(),
    ts: Date.now()
  };
  entries.unshift(entry);
  save(entries);

  // Reset
  pendingX = null;
  pendingY = null;
  pendingColor = null;
  marker.classList.remove('visible');
  noteRow.classList.remove('visible');
  noteInput.value = '';

  renderAll();
});

// Allow Enter to log
noteInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') logBtn.click();
});

/* ── Render today's dots on the field ── */
function renderFieldDots() {
  // Remove old dots
  field.querySelectorAll('.field-dot').forEach(function(d) { d.remove(); });

  var tk = todayKey();
  entries.forEach(function(e) {
    if (dayKey(new Date(e.ts)) === tk) {
      var dot = document.createElement('div');
      dot.className = 'field-dot';
      dot.style.left = (e.x * 100) + '%';
      dot.style.top = (e.y * 100) + '%';
      dot.style.background = e.color;
      field.appendChild(dot);
    }
  });
}

/* ── Render Week Ribbon ── */
function renderRibbon() {
  var ribbon = document.getElementById('ribbon');
  ribbon.innerHTML = '';
  var dayNames = ['S','M','T','W','T','F','S'];
  var now = new Date();

  for (var i = 6; i >= 0; i--) {
    var d = new Date(now);
    d.setDate(d.getDate() - i);
    var dk = dayKey(d);
    var dayEntries = entries.filter(function(e) { return dayKey(new Date(e.ts)) === dk; });

    var col = document.createElement('div');
    col.className = 'ribbon-day';

    var bar = document.createElement('div');
    bar.className = 'ribbon-bar';

    if (dayEntries.length > 0) {
      // Average color
      var tr = 0, tg = 0, tb = 0;
      dayEntries.forEach(function(e) {
        var rgb = parseRGB(e.color);
        tr += rgb[0]; tg += rgb[1]; tb += rgb[2];
      });
      var n = dayEntries.length;
      bar.style.background = 'rgb(' + Math.round(tr/n) + ',' + Math.round(tg/n) + ',' + Math.round(tb/n) + ')';
      bar.style.borderColor = 'transparent';
    }

    var lbl = document.createElement('div');
    lbl.className = 'ribbon-label';
    lbl.textContent = dayNames[d.getDay()];

    col.appendChild(bar);
    col.appendChild(lbl);
    ribbon.appendChild(col);
  }
}

/* ── Render History ── */
function renderHistory() {
  var list = document.getElementById('historyList');
  list.innerHTML = '';
  var recent = entries.slice(0, 10);

  if (recent.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-text">Tap the color field to log your first mood.</div></div>';
    return;
  }

  recent.forEach(function(e, idx) {
    var card = document.createElement('div');
    card.className = 'history-card';
    card.style.animationDelay = (idx * 0.03) + 's';

    var dot = document.createElement('div');
    dot.className = 'history-dot';
    dot.style.background = e.color;

    var body = document.createElement('div');
    body.className = 'history-body';

    var note = document.createElement('div');
    note.className = 'history-note' + (e.note ? '' : ' muted');
    note.textContent = e.note || 'no note';

    var time = document.createElement('div');
    time.className = 'history-time';
    time.textContent = formatTime(e.ts);

    body.appendChild(note);
    body.appendChild(time);

    var del = document.createElement('button');
    del.className = 'history-del';
    del.innerHTML = '&#x2715;';
    del.title = 'Delete';
    del.addEventListener('click', function() {
      entries = entries.filter(function(en) { return en.id !== e.id; });
      save(entries);
      renderAll();
    });

    card.appendChild(dot);
    card.appendChild(body);
    card.appendChild(del);
    list.appendChild(card);
  });
}

/* ── Render All ── */
function renderAll() {
  renderFieldDots();
  renderRibbon();
  renderHistory();
}

renderAll();
</script>
</body>
</html>
