<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>mp</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0b14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .greeting-wrap {
      padding: 2rem 0 1.5rem;
    }
    .greeting-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      background: linear-gradient(135deg, var(--text) 40%, var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .greeting-text {
      font-size: 0.88rem;
      color: var(--text2);
      margin-top: 0.6rem;
      font-weight: 500;
    }
    .greeting-date {
      font-size: 0.68rem;
      color: var(--text3);
      margin-top: 0.35rem;
    }

    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 1.25rem;
    }
    .home-grid .card-interactive { min-height: 120px; }
    .home-grid .card-full { grid-column: 1 / -1; min-height: auto; }

    .card-icon-wrap {
      width: 36px; height: 36px;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.65rem;
      font-size: 1rem;
    }

    .card-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.1rem;
    }

    .anchor-mini {
      display: flex;
      gap: 4px;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }
    .anchor-mini-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text4);
    }
    .anchor-mini-dot.done { background: var(--amber); }

    .quote-section {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      text-align: center;
    }
    .quote-text {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.65;
      font-style: italic;
      max-width: 340px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <!-- Safety Bar -->
  <div class="safety-bar" id="safetyBar"></div>

  <div class="page">
    <!-- Greeting -->
    <div class="greeting-wrap fade-up">
      <div class="greeting-time" id="clock">--:--</div>
      <div class="greeting-text" id="greeting"></div>
      <div class="greeting-date" id="dateStr"></div>
    </div>

    <!-- Module cards -->
    <div class="section-head fade-up" style="animation-delay:0.06s">
      <span class="label">Your sanctuary</span>
    </div>

    <div class="home-grid stagger">
      <!-- Anchors -->
      <a href="anchors.html" class="card card-interactive">
        <div class="card-icon-wrap bg-amber-dim text-amber">&#9875;</div>
        <div class="card-title">Anchors</div>
        <div class="card-desc">Your rituals today</div>
        <div class="anchor-mini" id="anchorDots"></div>
      </a>

      <!-- Magpie -->
      <a href="magpie.html" class="card card-interactive">
        <div class="card-icon-wrap bg-lav-dim text-lav">&#10024;</div>
        <div class="card-title">Magpie</div>
        <div class="card-desc" id="magpieStatus">Your daily spark</div>
      </a>

      <!-- Maya & Dobby -->
      <a href="pets.html" class="card card-interactive">
        <div class="card-icon-wrap bg-rose-dim text-rose">&#128062;</div>
        <div class="card-title">Maya & Dobby</div>
        <div class="card-desc" id="petsDesc">Their shrine</div>
      </a>

      <!-- Studio -->
      <a href="studio.html" class="card card-interactive">
        <div class="card-icon-wrap bg-sage-dim text-sage">&#9998;</div>
        <div class="card-title">Studio</div>
        <div class="card-desc">Your private space</div>
      </a>

      <!-- Spiral Kit (full width, special) -->
      <a href="spiral.html" class="card card-interactive card-full" style="border-color: rgba(123,166,149,0.15); background: linear-gradient(135deg, var(--surface), rgba(123,166,149,0.03));">
        <div style="display:flex; align-items:center; gap:0.75rem;">
          <div class="card-icon-wrap bg-sage-dim text-sage" style="width:40px;height:40px;">&#128737;</div>
          <div>
            <div class="card-title">Spiral Kit</div>
            <div class="card-desc">Grounding tools for when the gremlins arrive</div>
          </div>
        </div>
      </a>

      <!-- North Star -->
      <a href="north-star.html" class="card card-interactive card-full" style="border-color: rgba(155,142,196,0.12);">
        <div style="display:flex; align-items:center; gap:0.75rem;">
          <div class="card-icon-wrap bg-lav-dim text-lav" style="width:40px;height:40px;">&#11088;</div>
          <div>
            <div class="card-title">North Star</div>
            <div class="card-desc">Where all of this is heading</div>
          </div>
        </div>
      </a>
    </div>

    <!-- Daily quote / affirmation -->
    <div class="quote-section fade-up" style="animation-delay:0.4s" id="dailyQuote"></div>
  </div>

  <!-- Dock -->
  <nav class="dock">
    <a class="dock-item" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
      <span>Home</span>
    </a>
    <a class="dock-item" href="anchors.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="22"/><path d="M5 12H2a10 10 0 0020 0h-3"/></svg>
      <span>Anchors</span>
    </a>
    <a class="dock-item spiral-btn" href="spiral.html">
      <svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
    </a>
    <a class="dock-item" href="magpie.html">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>Magpie</span>
    </a>
    <a class="dock-item" href="pets.html">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="none"/></svg>
      <span>Pets</span>
    </a>
  </nav>

  <script src="sanctuary.js"></script>
  <script>
    // ── Clock & Greeting ─────────────────────
    function updateClock() {
      var now = new Date();
      var h = now.getHours();
      var hh = h.toString().padStart(2, '0');
      var mm = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('clock').textContent = hh + ':' + mm;

      var part = h < 6 ? 'The world is quiet. So can you be.'
        : h < 12 ? 'Good morning, Mandy.'
        : h < 17 ? 'Good afternoon.'
        : h < 21 ? 'Good evening.'
        : 'You made it through another day.';
      document.getElementById('greeting').textContent = part;

      document.getElementById('dateStr').textContent = now.toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long'
      });
    }
    updateClock();
    setInterval(updateClock, 30000);

    // ── Anchor dots ──────────────────────────
    function renderAnchorDots() {
      var anchors = sLoad(S_KEYS.anchors, []);
      var log = sLoad(S_KEYS.anchorsLog, {});
      var today = sToday();
      var todayLog = log[today] || [];
      var el = document.getElementById('anchorDots');
      if (!anchors.length) {
        el.innerHTML = '<span style="font-size:0.62rem;color:var(--text4)">No anchors yet</span>';
        return;
      }
      el.innerHTML = anchors.map(function (a) {
        var done = todayLog.indexOf(a.id) !== -1;
        return '<div class="anchor-mini-dot' + (done ? ' done' : '') + '" title="' + sEsc(a.name) + '"></div>';
      }).join('');
    }
    renderAnchorDots();

    // ── Magpie status ────────────────────────
    function renderMagpieStatus() {
      var data = sLoad(S_KEYS.magpie, {});
      var el = document.getElementById('magpieStatus');
      if (data.lastDate === sToday() && data.watched) {
        el.textContent = 'Spark collected today';
        el.style.color = 'var(--safe)';
      } else {
        el.textContent = 'Your daily spark awaits';
      }
    }
    renderMagpieStatus();

    // ── Pets desc ────────────────────────────
    function renderPetsDesc() {
      var pets = sLoad(S_KEYS.pets, { entries: [] });
      var el = document.getElementById('petsDesc');
      var c = pets.entries ? pets.entries.length : 0;
      el.textContent = c ? c + ' memories saved' : 'Their shrine';
    }
    renderPetsDesc();

    // ── Daily quote / affirmation ────────────
    var QUOTES = [
      'You have survived 100% of your worst days.',
      'Showing up — even half-assed — counts.',
      'You are not behind. You are not broken. You are building something.',
      'The fact that you are trying at all is the bravest thing.',
      'Rest is not giving up. Rest is how you keep going.',
      'You don\'t have to earn safety. It\'s yours.',
      'Some days the win is just being here. That\'s enough.',
      'Healing isn\'t linear, and that\'s not a failure.',
      'The version of you that needed saving? You became her rescuer.',
      'You built your own rituals when no one gave you any. That takes strength.',
      'Maya is in the next room. Dobby is probably doing something ridiculous.',
      'Every IVA payment is a brick in the foundation you\'re building.',
      'The Antikythera Mechanism existed for 2000 years before anyone understood it. Some things take time.',
      'Your body got you through today. Thank it.',
      'You are allowed to take up space. You are allowed to be here.'
    ];

    function renderQuote() {
      // Use the day of year as seed for consistency within a day
      var now = new Date();
      var start = new Date(now.getFullYear(), 0, 0);
      var dayOfYear = Math.floor((now - start) / 86400000);
      var q = QUOTES[dayOfYear % QUOTES.length];
      document.getElementById('dailyQuote').innerHTML =
        '<div class="quote-text">"' + q + '"</div>';
    }
    renderQuote();
  </script>
</body>
</html>
